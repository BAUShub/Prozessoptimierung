                            { name: '624 Termine', ergebnisse: '<ul><li>Terminpläne</li></ul>', auftraggeber: '<ul><li>Genehmigen der Termine</li></ul>', planer: '<span class="modulTitle">624.1 Termine der Massnahmen</span><ul><li>Planen der Termine für die Durchführung von Massnahmen</li></ul>' },
                            { name: '625 Administration', ergebnisse: '<ul><li>Protokolle</li><li>Statistiken</li><li>Dokumentation</li></ul>', auftraggeber: '', planer: '<span class="modulTitle">625.1 Dokumentation</span><ul><li>Zusammenstellen der Grundlagen, Ergebnisse und Entscheide</li></ul>' }
                        ],
                        schritte: [
                            { titel: 'Erhaltungsplan erarbeiten', beschreibung: 'Langfristige Planung zur Sicherung der Bausubstanz.', links: [] },
                            { titel: 'Inspektionen durchführen', beschreibung: 'Zustandskontrolle gemäss Überwachungsplan.', links: [] },
                            { titel: 'Bauwerksakten nachführen', beschreibung: 'Aktualisierung der Dokumentation nach erfolgten Massnahmen.', links: [] },
                            { titel: 'Budgets erstellen', beschreibung: 'Finanzplanung für die Erhaltungsmassnahmen.', links: [] },
                            { titel: 'Terminpläne umsetzen', beschreibung: 'Organisation der Ausführung der Erhaltungsmassnahmen.', links: [] },
                            { titel: 'Statistiken aktualisieren', beschreibung: 'Nachführung der Daten zur Zustandskontrolle.', links: [] }
                        ]
                    }
                ]
            }
        ];

        const timelineContainer = document.getElementById('timeline');
        const teilphasenContainer = document.getElementById('teilphasen');
        const detailsContainer = document.getElementById('details');
        const placeholder = document.getElementById('placeholder');
        const modalOverlay = document.getElementById('stepModal');

        let activePhaseId = null;

        data.forEach(phase => {
            const node = document.createElement('div');
            node.className = 'phaseNode';
            
            const title = document.createElement('div');
            title.className = 'phaseTitle';
            title.innerText = phase.title;
            
            const dot = document.createElement('div');
            dot.className = 'phaseDot';

            node.appendChild(title);
            node.appendChild(dot);

            node.onclick = () => selectPhase(phase, node);
            timelineContainer.appendChild(node);
        });

        function selectPhase(phase, nodeElement) {
            document.querySelectorAll('.phaseNode').forEach(el => el.classList.remove('active'));
            nodeElement.classList.add('active');
            
            activePhaseId = phase.id;
            placeholder.style.display = 'none';
            detailsContainer.style.display = 'none';
            
            teilphasenContainer.innerHTML = '';
            teilphasenContainer.style.display = 'flex';
            
            if (phase.teilphasen.length > 1) {
                const line = document.createElement('div');
                line.className = 'subTimelineLine';
                teilphasenContainer.appendChild(line);
                teilphasenContainer.style.justifyContent = 'space-between';
            } else {
                teilphasenContainer.style.justifyContent = 'center';
            }
            
            phase.teilphasen.forEach(tp => {
                const node = document.createElement('div');
                node.className = 'subPhaseNode';
                
                const title = document.createElement('div');
                title.className = 'subPhaseTitle';
                title.innerText = tp.title;
                
                const dot = document.createElement('div');
                dot.className = 'subPhaseDot';

                node.appendChild(title);
                node.appendChild(dot);

                node.onclick = () => selectTeilphase(tp, node);
                teilphasenContainer.appendChild(node);
            });
        }

        function selectTeilphase(tp, nodeElement) {
            document.querySelectorAll('.subPhaseNode').forEach(el => el.classList.remove('active'));
            nodeElement.classList.add('active');

            detailsContainer.style.display = 'block';
            let html = `<h2>${tp.title}</h2><p><strong>Ziele:</strong> ${tp.ziele}</p>`;
            
            if (tp.schritte && tp.schritte.length > 0) {
                html += `<div class="stepTimelineWrapper">
                            <h3>Prozessschritte für Phase ${tp.title}</h3>
                            <div class="stepTimelineContainer">
                                <div class="stepTimelineLine"></div>`;
                
                tp.schritte.forEach((schritt, index) => {
                    const safeSchritt = JSON.stringify(schritt).replace(/'/g, "&#39;");
                    html += `   <div class="stepNode" onclick='openModal(${safeSchritt})'>
                                    <div class="stepTitle">
                                        <span class="stepNumberBadge">Schritt ${index + 1}</span>
                                        ${schritt.titel}
                                    </div>
                                    <div class="stepDot"></div>
                                </div>`;
                });
                html += `   </div>
                         </div>`;
            }

            if (tp.bereiche && tp.bereiche.length > 0) {
                html += `<details class="siaDetails">
                            <summary class="siaSummary">Detaillierte SIA Anforderungen einblenden</summary>
                            <table>
                                <tr>
                                    <th>Leistungsbereiche</th>
                                    <th>Erwartete Ergebnisse und Dokumente</th>
                                    <th>Leistungen und Entscheide des Auftraggebers</th>
                                    <th>Leistungen der Planer (mögliche Modulinhalte)</th>
                                </tr>`;
                tp.bereiche.forEach(b => {
                    html += `<tr>
                                <td class="leistungsbereich">${b.name}</td>
                                <td>${b.ergebnisse || ''}</td>
                                <td>${b.auftraggeber || ''}</td>
                                <td>${b.planer || ''}</td>
                             </tr>`;
                });
                html += `   </table>
                         </details>`;
            }
            
            detailsContainer.innerHTML = html;
        }

        function openModal(schritt) {
            document.getElementById('modalTitle').innerText = schritt.titel;
            document.getElementById('modalDescription').innerText = schritt.beschreibung;
            
            const linksContainer = document.getElementById('modalLinksContainer');
            linksContainer.innerHTML = '';

            if (schritt.links && schritt.links.length > 0) {
                const linksTitle = document.createElement('div');
                linksTitle.className = 'modalLinksTitle';
                linksTitle.innerText = 'Verfügbare Vorlagen und Referenzen:';
                linksContainer.appendChild(linksTitle);

                schritt.links.forEach(link => {
                    const a = document.createElement('a');
                    a.href = link.url;
                    a.target = '_blank';
                    a.className = 'modalLink';
                    a.innerText = link.title;
                    linksContainer.appendChild(a);
                });
            } else {
                const noLinksInfo = document.createElement('div');
                noLinksInfo.style.fontStyle = 'italic';
                noLinksInfo.style.color = '#6969d9';
                noLinksInfo.innerText = 'Für diesen Schritt sind aktuell keine spezifischen Vorlagen hinterlegt.';
                linksContainer.appendChild(noLinksInfo);
            }

            modalOverlay.style.display = 'flex';
        }

        function closeModal() {
            modalOverlay.style.display = 'none';
        }

        window.onclick = function(event) {
            if (event.target == modalOverlay) {
                closeModal();
            }
        }
    </script>
</body>
</html>
